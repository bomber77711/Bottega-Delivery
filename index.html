<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127813;</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bottega Delivery - The Digital Atlas of Italian Gastronomy" />
    <title>Bottega Delivery</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    document.addEventListener("click", function(e) {
      var el = e.target;
      while (el && el !== document.body) {
        if (el.tagName === "g") {
          var style = el.getAttribute("style") || "";
          if (style.indexOf("cursor") >= 0) {
            var keys = Object.keys(el);
            for (var i = 0; i < keys.length; i++) {
              if (keys[i].indexOf("__reactProps") >= 0) {
                var props = el[keys[i]];
                if (props && typeof props.onClick === "function") {
                  e.stopPropagation();
                  props.onClick(e);
                  return;
                }
              }
            }
            break;
          }
        }
        el = el.parentElement;
      }
    }, true);
    </script>
  </body>
</html>
