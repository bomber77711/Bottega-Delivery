<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127813;</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bottega Delivery - The Digital Atlas of Italian Gastronomy" />
    <title>Bottega Delivery</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    function isZoomed() {
      var els = document.querySelectorAll("p,span,div");
      for (var i = 0; i < els.length; i++) {
        if (els[i].textContent === "ITALIAN REGION" && els[i].children.length === 0) return true;
      }
      return false;
    }
    function nearestMarker(x, y, maxDist) {
      var gs = document.querySelectorAll("g");
      var best = null;
      var bd = maxDist;
      for (var i = 0; i < gs.length; i++) {
        var s = gs[i].getAttribute("style") || "";
        if (s.indexOf("cursor") < 0) continue;
        var r = gs[i].getBoundingClientRect();
        if (r.width < 5) continue;
        var cx = r.left + r.width / 2;
        var cy = r.top + r.height / 2;
        var dx = x - cx;
        var dy = y - cy;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < bd) { bd = d; best = gs[i]; }
      }
      return best;
    }
    function getReactOnClick(el) {
      var ks = Object.keys(el);
      for (var i = 0; i < ks.length; i++) {
        if (ks[i].indexOf("__reactProps") >= 0) {
          var p = el[ks[i]];
          if (p && typeof p.onClick === "function") return p.onClick;
        }
      }
      return null;
    }
    function findMarkerParent(target) {
      var el = target;
      while (el && el !== document.body) {
        if (el.tagName === "g") {
          var st = el.getAttribute("style") || "";
          if (st.indexOf("cursor") >= 0) return el;
        }
        el = el.parentElement;
      }
      return null;
    }
    document.addEventListener("click", function(e) {
      var markerG = findMarkerParent(e.target);
      if (!isZoomed()) {
        if (markerG) {
          e.stopImmediatePropagation();
          e.preventDefault();
          var stack = document.elementsFromPoint(e.clientX, e.clientY);
          for (var j = 0; j < stack.length; j++) {
            if (stack[j].tagName === "path") {
              var fn = getReactOnClick(stack[j]);
              if (fn) { fn(e); return; }
            }
          }
        }
        return;
      }
      if (!markerG) {
        markerG = nearestMarker(e.clientX, e.clientY, 25);
      }
      if (markerG) {
        e.stopImmediatePropagation();
        e.preventDefault();
        var fn = getReactOnClick(markerG);
        if (fn) { fn(e); }
      }
    }, true);
    document.addEventListener("mousemove", function(e) {
      var tg = e.target;
      var tgStyle = tg.getAttribute ? (tg.getAttribute("style") || "") : "";
      if (tg.tagName === "DIV" && tgStyle.indexOf("z-index") >= 0) {
        var m = nearestMarker(e.clientX, e.clientY, 25);
        tg.style.cursor = m ? "pointer" : "";
      }
    });
    </script>
  </body>
</html>
