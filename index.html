<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127813;</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bottega Delivery - The Digital Atlas of Italian Gastronomy" />
    <title>Bottega Delivery</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    document.addEventListener("click", function(e) {
      var el = e.target;
      var markerG = null;
      while (el && el !== document.body) {
        if (el.tagName === "g") {
          var st = el.getAttribute("style") || "";
          if (st.indexOf("cursor") >= 0) { markerG = el; break; }
        }
        el = el.parentElement;
      }
      if (!markerG) {
        var tg = e.target;
        var tgStyle = tg.getAttribute ? (tg.getAttribute("style") || "") : "";
        var isOverlay = tg.tagName === "path" || (tg.tagName === "DIV" && tgStyle.indexOf("z-index") >= 0) || tg.tagName === "rect";
        if (isOverlay) {
          var gs = document.querySelectorAll("g");
          var bd = 25;
          for (var i = 0; i < gs.length; i++) {
            var s = gs[i].getAttribute("style") || "";
            if (s.indexOf("cursor") < 0) continue;
            var r = gs[i].getBoundingClientRect();
            if (r.width < 5) continue;
            var cx = r.left + r.width / 2;
            var cy = r.top + r.height / 2;
            var dx = e.clientX - cx;
            var dy = e.clientY - cy;
            var d = Math.sqrt(dx * dx + dy * dy);
            if (d < bd) { bd = d; markerG = gs[i]; }
          }
        }
      }
      if (markerG) {
        var ks = Object.keys(markerG);
        for (var i = 0; i < ks.length; i++) {
          if (ks[i].indexOf("__reactProps") >= 0) {
            var p = markerG[ks[i]];
            if (p && typeof p.onClick === "function") {
              e.stopPropagation();
              p.onClick(e);
              return;
            }
          }
        }
      }
    }, true);
    </script>
  </body>
</html>
