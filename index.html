<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127813;</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bottega Delivery - The Digital Atlas of Italian Gastronomy" />
    <title>Bottega Delivery</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    document.addEventListener("click",function(e){
      var zd=false;
      var ps=document.querySelectorAll("p,span");
      for(var i=0;i<ps.length;i++){if(ps[i].textContent==="ITALIAN REGION"){zd=true;break;}}
      if(!zd)return;
      var gs=document.querySelectorAll("g");
      var best=null,bd=25;
      for(var i=0;i<gs.length;i++){
        var s=gs[i].getAttribute("style")||"";
        if(s.indexOf("cursor")<0)continue;
        var r=gs[i].getBoundingClientRect();
        if(r.width<5)continue;
        var cx=r.left+r.width/2,cy=r.top+r.height/2;
        var dx=e.clientX-cx,dy=e.clientY-cy;
        var d=Math.sqrt(dx*dx+dy*dy);
        if(d<bd){bd=d;best=gs[i];}
      }
      if(best){
        e.stopPropagation();
        var ks=Object.keys(best);
        for(var k=0;k<ks.length;k++){
          if(ks[k].indexOf("__reactProps")>=0){
            var p=best[ks[k]];
            if(p&&typeof p.onClick==="function"){p.onClick(e);return;}
          }
        }
      }
    },true);
    </script>
  </body>
</html>
